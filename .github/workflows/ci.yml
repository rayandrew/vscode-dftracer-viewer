name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run compile
      # Headless VS Code needs a virtual display. The server e2e tests skip
      # without DFTRACER_SERVER_PATH, so this runs the activation suite.
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: xvfb-run -a npm test
      - run: npx @vscode/vsce package -o dftracer-viewer.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
